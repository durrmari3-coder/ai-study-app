<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - AI Study App</title>
    <meta name="description" content="Lumina AI Study App - Generate flashcards, quizzes, presentations, and infographics from your study materials using AI.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation (thin icon-only) -->
        <nav class="sidebar">
            <div class="logo">
                <ion-icon name="sparkles"></ion-icon>
                <span>Lumina</span>
            </div>
            
            <ul class="nav-links" id="nav-menu">
                <li class="active" data-route="dashboard">
                    <ion-icon name="grid-outline"></ion-icon>
                    <span>Dashboard</span>
                </li>
                <li data-route="notebook">
                    <ion-icon name="chatbubbles-outline"></ion-icon>
                    <span>Notebook</span>
                </li>
                <li data-route="overviews">
                    <ion-icon name="play-circle-outline"></ion-icon>
                    <span>Overviews</span>
                </li>
                <li data-route="studio">
                    <ion-icon name="color-palette-outline"></ion-icon>
                    <span>Creative Studio</span>
                </li>
                <li data-route="pathways">
                    <ion-icon name="map-outline"></ion-icon>
                    <span>Pathways</span>
                </li>
                <li data-route="flashcards">
                    <ion-icon name="albums-outline"></ion-icon>
                    <span>Flashcards</span>
                </li>
                <li data-route="quizzes">
                    <ion-icon name="help-circle-outline"></ion-icon>
                    <span>Quizzes</span>
                </li>
                <li data-route="study-rooms">
                    <ion-icon name="people-outline"></ion-icon>
                    <span>Study Rooms</span>
                </li>
                <li data-route="blur-study">
                    <ion-icon name="eye-off-outline"></ion-icon>
                    <span>Blur Study</span>
                </li>
                <li data-route="podcast">
                    <ion-icon name="radio-outline"></ion-icon>
                    <span>Podcast</span>
                </li>
                <li data-route="review-mistakes">
                    <ion-icon name="alert-circle-outline"></ion-icon>
                    <span>Mistakes</span>
                </li>
                <li data-route="mastery">
                    <ion-icon name="bar-chart-outline"></ion-icon>
                    <span>Analytics</span>
                </li>
                <li data-route="settings" style="margin-top: auto">
                    <ion-icon name="settings-outline"></ion-icon>
                    <span>Settings</span>
                </li>
            </ul>
        </nav>

        <!-- Sources Sidebar (NotebookLM Style) -->
        <aside class="sources-sidebar">
            <div class="sources-header">
                <h2>Sources</h2>
                <button class="btn btn-primary btn-add-source" onclick="openIngestModal()" title="Add Source">
                    <ion-icon name="add-outline"></ion-icon>
                </button>
            </div>
            <p class="sources-subtitle">Select sources to include in context</p>
            <div class="sources-list" id="global-sources-list">
                <!-- Sources dynamically injected here by app.js -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div class="flex-spacer"></div>
                <div id="api-key-status" class="status-badge missing">API Key Missing</div>
                <div class="user-profile" onclick="if(confirm('Clear all data and reset?')) window.signOutUser()" style="cursor:pointer" title="Reset App">
                    <div class="avatar" id="user-avatar">
                        <ion-icon name="person-outline"></ion-icon>
                    </div>
                </div>
            </header>
            
            <div id="content-area" class="content-area">
                <!-- Views dynamically injected here -->
            </div>
        </main>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal Container -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-backdrop" onclick="document.getElementById('modal-container').classList.add('hidden')"></div>
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
