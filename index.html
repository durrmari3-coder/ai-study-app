<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina — AI Research OS</title>
    <meta name="description" content="Lumina AI — NotebookLM-style research OS. Upload sources, chat with AI, generate Audio Overviews, Mind Maps, Flashcards, Quizzes, and more.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd/index.js"></script>
</head>
<body>
    <!-- ============================================================ -->
    <!--  LUMINA APP SHELL                                           -->
    <!-- ============================================================ -->
    <div class="lumina-app" id="lumina-app">

        <!-- ① Icon Nav Strip (far left) -->
        <nav class="icon-nav" id="icon-nav">
            <div class="icon-nav-logo" onclick="window.navigate('notebooks')" title="Notebooks Home">
                <ion-icon name="sparkles"></ion-icon>
            </div>

            <div class="icon-nav-section">
                <button class="icon-nav-btn active" data-route="notebooks" onclick="window.navigate('notebooks')" title="Notebooks">
                    <ion-icon name="library-outline"></ion-icon>
                    <span>Notebooks</span>
                </button>
                <button class="icon-nav-btn" data-route="notebook" onclick="window.navigate('notebook')" title="Chat">
                    <ion-icon name="chatbubbles-outline"></ion-icon>
                    <span>Chat</span>
                </button>
                <button class="icon-nav-btn" data-route="notes" onclick="window.navigate('notes')" title="Notes">
                    <ion-icon name="document-text-outline"></ion-icon>
                    <span>Notes</span>
                </button>
                <button class="icon-nav-btn" data-route="studio" onclick="window.navigate('studio')" title="Studio">
                    <ion-icon name="color-palette-outline"></ion-icon>
                    <span>Studio</span>
                </button>
                <button class="icon-nav-btn" data-route="overviews" onclick="window.navigate('overviews')" title="Overviews">
                    <ion-icon name="play-circle-outline"></ion-icon>
                    <span>Reports</span>
                </button>
                <button class="icon-nav-btn" data-route="pathways" onclick="window.navigate('pathways')" title="Pathways">
                    <ion-icon name="map-outline"></ion-icon>
                    <span>Pathways</span>
                </button>
                <button class="icon-nav-btn" data-route="flashcards" onclick="window.navigate('flashcards')" title="Flashcards">
                    <ion-icon name="albums-outline"></ion-icon>
                    <span>Cards</span>
                </button>
                <button class="icon-nav-btn" data-route="quizzes" onclick="window.navigate('quizzes')" title="Quizzes">
                    <ion-icon name="help-circle-outline"></ion-icon>
                    <span>Quiz</span>
                </button>
                <button class="icon-nav-btn" data-route="podcast" onclick="window.navigate('podcast')" title="Audio">
                    <ion-icon name="radio-outline"></ion-icon>
                    <span>Audio</span>
                </button>
                <button class="icon-nav-btn" data-route="blur-study" onclick="window.navigate('blur-study')" title="Blur Study">
                    <ion-icon name="eye-off-outline"></ion-icon>
                    <span>Recall</span>
                </button>
                <button class="icon-nav-btn" data-route="study-rooms" onclick="window.navigate('study-rooms')" title="Group Study">
                    <ion-icon name="people-outline"></ion-icon>
                    <span>Rooms</span>
                </button>
                <button class="icon-nav-btn" data-route="discover" onclick="window.navigate('discover')" title="Discover">
                    <ion-icon name="globe-outline"></ion-icon>
                    <span>Discover</span>
                </button>
                <button class="icon-nav-btn" data-route="search-sources" onclick="window.navigate('search-sources')" title="Web Search">
                    <ion-icon name="search-outline"></ion-icon>
                    <span>Search</span>
                </button>
                <button class="icon-nav-btn" data-route="analytics" onclick="window.navigate('analytics')" title="Analytics">
                    <ion-icon name="bar-chart-outline"></ion-icon>
                    <span>Analytics</span>
                </button>
                <button class="icon-nav-btn" data-route="review-mistakes" onclick="window.navigate('review-mistakes')" title="Mistake Bank">
                    <ion-icon name="bug-outline"></ion-icon>
                    <span>Mistakes</span>
                </button>
            </div>

            <div class="icon-nav-bottom">
                <button class="icon-nav-btn" onclick="window.showHelpGuide()" title="Help & Onboarding">
                    <ion-icon name="help-circle-outline"></ion-icon>
                    <span>Help</span>
                </button>
                <button class="icon-nav-btn" data-route="settings" onclick="window.navigate('settings')" title="Settings">
                    <ion-icon name="settings-outline"></ion-icon>
                    <span>Settings</span>
                </button>
                <div class="icon-nav-user" id="nav-user-avatar" onclick="window.showUserMenu()" title="Account">
                    <ion-icon name="person-circle-outline"></ion-icon>
                </div>
            </div>
        </nav>

        <!-- ② Main Workspace (3-panel for notebook mode, full-width for other routes) -->
        <main class="workspace" id="workspace">
            <div id="view-container">
                <!-- Views injected here by router -->
                <div style="display:flex; align-items:center; justify-content:center; height:100vh; color:var(--text-muted);">
                    <ion-icon name="sync-outline" class="spin" style="font-size:2rem;"></ion-icon>
                </div>
            </div>
        </main>
    </div>

    <!-- UI Components (Modals, Toasts) -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-backdrop" onclick="document.getElementById('modal-container').classList.add('hidden')"></div>
        <div class="modal-content glass-panel" id="modal-body"></div>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <!-- Configuration Sidebar (Slide-out) -->
    <div id="config-panel" class="config-panel glass-panel">
        <div style="padding:1.5rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h3 style="margin:0;">Notebook Config</h3>
                <button class="panel-icon-btn" onclick="window.toggleConfigPanel()"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div class="form-group">
                <label>AI Persona</label>
                <select id="config-persona" class="form-control" onchange="window.saveNotebookConfig()">
                    <option value="academic">Academic Analyst</option>
                    <option value="socratic">Socratic Tutor</option>
                    <option value="creative">Creative Strategist</option>
                    <option value="technical">Technical Expert</option>
                </select>
            </div>
            <div class="form-group">
                <label>Response Tone</label>
                <select id="config-tone" class="form-control" onchange="window.saveNotebookConfig()">
                    <option value="neutral">Neutral</option>
                    <option value="encouraging">Encouraging</option>
                    <option value="formal">Formal</option>
                    <option value="concise">Concise</option>
                </select>
            </div>
            <div class="form-group">
                <label>Response Length</label>
                <select id="config-length" class="form-control" onchange="window.saveNotebookConfig()">
                    <option value="concise">Concise</option>
                    <option value="balanced" selected>Balanced</option>
                    <option value="detailed">Detailed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Output Language</label>
                <select id="config-language" class="form-control" onchange="window.saveNotebookConfig()">
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Portuguese">Portuguese</option>
                    <option value="Mandarin Chinese">Mandarin Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Italian">Italian</option>
                    <option value="Dutch">Dutch</option>
                    <option value="Russian">Russian</option>
                    <option value="Swedish">Swedish</option>
                    <option value="Turkish">Turkish</option>
                    <option value="Italian">Italian</option>
                </select>
            </div>
            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem;">Settings saved per notebook automatically.</div>
        </div>
    </div>

    <script>
        // --- Phase 18: Onboarding & Help ---
        window.showHelpGuide = () => {
            window.showModal('Welcome to Lumina Cognitive OS', `
                <div style="max-height:400px; overflow-y:auto; padding-right:0.5rem;">
                    <div style="text-align:center; margin-bottom:2rem;">
                        <div style="font-size:3rem; margin-bottom:1rem;">🚀</div>
                        <h3 style="margin-bottom:0.5rem;">NotebookLM 2026 Parity Reached</h3>
                        <p style="color:var(--text-muted); font-size:0.9rem;">You are using the world's most advanced AI research ecosystem.</p>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
                        <div class="glass-panel" style="padding:1rem; border-color:var(--accent); background:rgba(59,130,246,0.05);">
                            <h4 style="margin-bottom:0.5rem;"><ion-icon name="documents-outline"></ion-icon> Multi-Source RAG</h4>
                            <p style="font-size:0.8rem; color:var(--text-muted);">Add PDFs, Website URLs, and YouTube videos. Lumina indexes them for instant academic recall.</p>
                        </div>
                        <div class="glass-panel" style="padding:1rem; background:rgba(255,255,255,0.02);">
                            <h4 style="margin-bottom:0.5rem;"><ion-icon name="videocam-outline"></ion-icon> Cinematic Studio</h4>
                            <p style="font-size:0.8rem; color:var(--text-muted);">Generate presentation slides and watch them in an interactive, narrated cinematic mode.</p>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:2rem; padding:1rem;" onclick="window.closeModal()">Start Researching</button>
                </div>
            `);
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd/index.js"></script>
    <script src="ui_utils.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="rag_engine.js"></script>
    <script type="module" src="notebooks_ext.js"></script>
    <script type="module" src="podcast_patch.js"></script>
    <script type="module" src="km_patch.js"></script>
    <script type="module" src="studio_patch.js"></script>
    <script type="module" src="video_engine.js"></script>
    <script type="module" src="discover_analytics.js"></script>
    <script type="module" src="vector_utils.js"></script>
    <script type="module" src="export_engine.js"></script>
    <script type="module" src="podcast_player.js"></script>
</body>
</html>
